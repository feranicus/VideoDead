# VideoDead — hardened containers on one droplet.
# Core stack: caddy (public 80/443), api, worker, redis.
# Optional "youtube" profile adds a Chromium + cookie-exporter that auto-feed
# YouTube cookies to the worker. Start it with:  docker compose --profile youtube up -d

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv/www:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks: [appnet]
    security_opt: ["no-new-privileges:true"]

  api:
    build: ./backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    volumes:
      - app_data:/data
      - downloads:/downloads
    expose: ["8000"]
    depends_on:
      redis: { condition: service_healthy }
    networks: [appnet, backnet]
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }

  worker:
    build: ./backend
    restart: unless-stopped
    command: arq app.worker.WorkerSettings
    env_file: .env
    volumes:
      - app_data:/data
      - downloads:/downloads
      - ./secrets:/secrets:ro       # manual cookies.txt (optional)
      - cookies:/cookies:ro         # auto cookies from the cookiejar (future VNC)
    depends_on:
      redis: { condition: service_healthy }
    networks: [appnet, backnet]
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 1024M }

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks: [backnet]
    security_opt: ["no-new-privileges:true"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- optional: YouTube auto-cookies (profile "youtube") ----
  browser:
    image: lscr.io/linuxserver/chromium:latest
    profiles: ["youtube"]
    restart: unless-stopped
    shm_size: "1gb"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - CUSTOM_USER=${BROWSER_USER:-admin}
      - PASSWORD=${BROWSER_PASSWORD:-changeme}
      - CHROME_CLI=--remote-debugging-port=9222 --remote-allow-origins=* https://www.youtube.com
    volumes:
      - chrome_profile:/config
    ports:
      - "127.0.0.1:3010:3000"       # login UI — localhost only, reach via SSH tunnel
    expose: ["9222"]
    networks: [appnet]
    security_opt: ["seccomp:unconfined"]

  cookie-exporter:
    build: ./cookiejar
    profiles: ["youtube"]
    restart: unless-stopped
    environment:
      - CDP_HOST=127.0.0.1:9222
      - COOKIES_OUT=/cookies/cookies.txt
      - EXPORT_INTERVAL=${EXPORT_INTERVAL:-300}
    volumes:
      - cookies:/cookies
    network_mode: "service:browser"   # share Chromium's netns -> reach 127.0.0.1:9222
    depends_on: [browser]
    security_opt: ["no-new-privileges:true"]

  # ---- optional: observability (profile "observe") ----
  prometheus:
    image: prom/prometheus:latest
    profiles: ["observe"]
    restart: unless-stopped
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=7d"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [appnet]
    deploy: { resources: { limits: { memory: 300M } } }

  node-exporter:
    image: prom/node-exporter:latest
    profiles: ["observe"]
    restart: unless-stopped
    command: ["--path.rootfs=/host"]
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks: [appnet]
    deploy: { resources: { limits: { memory: 64M } } }

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    profiles: ["observe"]
    restart: unless-stopped
    privileged: true
    devices: ["/dev/kmsg"]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks: [appnet]
    deploy: { resources: { limits: { memory: 200M } } }

  loki:
    image: grafana/loki:3.0.0
    profiles: ["observe"]
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./observability/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks: [appnet]
    deploy: { resources: { limits: { memory: 256M } } }

  promtail:
    image: grafana/promtail:3.0.0
    profiles: ["observe"]
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./observability/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [appnet]
    deploy: { resources: { limits: { memory: 128M } } }

  grafana:
    image: grafana/grafana:latest
    profiles: ["observe"]
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://${DOMAIN}/observe/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on: [prometheus, loki]
    networks: [appnet]
    deploy: { resources: { limits: { memory: 256M } } }

networks:
  appnet:
    driver: bridge
  backnet:
    internal: true

volumes:
  caddy_data:
  caddy_config:
  app_data:
  downloads:
  cookies:
  chrome_profile:
  prometheus_data:
  loki_data:
  grafana_data:
